<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ignore and Include</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{background:#000;color:#fff;font-family:Arial;text-align:center;margin:0;padding:10px;}
h1{margin-top:10px;font-size:clamp(28px,5vw,46px);}
#box{border:2px solid #fff;width:90%;max-width:320px;margin:15px auto;padding:10px;border-radius:10px;font-size:clamp(16px,3vw,20px);}
h2{font-size:clamp(18px,3.8vw,26px);padding:0 10px;}
#items{display:flex;flex-wrap:wrap;justify-content:center;}
.item{border:1px solid #fff;padding:10px;margin:6px;cursor:grab;border-radius:6px;width:90%;max-width:260px;font-size:clamp(14px,3vw,18px);}
#bucketWrap{display:flex;flex-wrap:wrap;justify-content:center;}
.bucket{width:90%;max-width:300px;min-height:140px;border:2px dashed #fff;margin:10px;padding:10px;border-radius:10px;font-size:clamp(16px,3vw,20px);}
.correct{background:#0066ff}
button{background:#000;color:#fff;border:2px solid #fff;padding:12px 22px;font-size:clamp(16px,3vw,22px);margin-top:20px;cursor:pointer;}
#gameOver,#win{display:none}
#penalty{display:none;color:#ff4444;font-weight:bold;font-size:22px;}
@media(min-width:900px){#bucketWrap{flex-wrap:nowrap}.bucket{width:35%;min-height:180px;}}
</style>
</head>

<body>

<h1>Ignore and Include</h1>

<div id="box">
  <div>Time: <span id="time">180</span>s</div>
  <div>Excitement: <span id="excite">100</span></div>
</div>

<div id="penalty">⚠️ Wrong bucket! -2 min ⏱️  -40 excitement 🎭</div>

<h2 id="question"></h2>
<div id="items"></div>

<div id="bucketWrap">
  <div class="bucket" id="ignore">Things to Ignore</div>
  <div class="bucket" id="tell">Things to Include</div>
</div>

<div id="gameOver">
  <h1>Game Over</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<div id="win">
  <h1>You Won!</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<script>
let time=180;
let excitement=100;
let gameEnded=false;
let timer;

timer=setInterval(()=>{
  if(gameEnded) return;
  time--;
  document.getElementById("time").innerText=time;
  if(time<=0) endGame();
},1000);

let situations=[
{
q:"You came back from school. What should you tell parents?",
tell:["Got a scolding from the teacher","You had dance class","You wrote a letter to a teacher and how she responded","You had been selected in music","Your friend was very upset"],
ignore:["You were writing about the chapter","A friend talked to you","A pigeon flew by the class"]
},
{
q:"Explain photosynthesis to class 1.",
tell:["Photosynthesis is the process of making sugar for plants"],
ignore:["Stomata take CO2 to chlorophyll","Happens inside plant cell","Epicuticular wax covers leaves"]
},
{
q:"Convince friends your game is best.",
tell:["The game is quick","The game will be fun","In this game you can learn how to cartwheel"],
ignore:["I want you to listen to me","Why are you not listening to me"]
}
];

let current=0;
let needed=0;

function loadSituation(){
  let s=situations[current];
  document.getElementById("question").innerText=s.q;
  document.getElementById("items").innerHTML="";
  document.getElementById("ignore").innerHTML="Things to Ignore";
  document.getElementById("tell").innerHTML="Things to Include";
  let all=[...s.tell.map(x=>({t:x,b:"tell"})),...s.ignore.map(x=>({t:x,b:"ignore"}))];
  needed=all.length;
  all.sort(()=>Math.random()-0.5);
  all.forEach(obj=>{
    let d=document.createElement("div");
    d.className="item";
    d.draggable=true;
    d.innerText=obj.t;
    d.ondragstart=e=>e.dataTransfer.setData("text",JSON.stringify(obj));
    document.getElementById("items").appendChild(d);
  });
}
loadSituation();

["ignore","tell"].forEach(id=>{
  let bucket=document.getElementById(id);
  bucket.ondragover=e=>e.preventDefault();
  bucket.ondrop=e=>{
    if(gameEnded) return;
    e.preventDefault();
    let data=JSON.parse(e.dataTransfer.getData("text"));
    if(data.b===id){
      let el=[...document.querySelectorAll(".item")].find(x=>x.innerText===data.t);
      el.classList.add("correct");
      bucket.appendChild(el);
      needed--;
      if(needed===0) next();
    }else{
      time-=120;
      excitement-=40;
      document.getElementById("excite").innerText=excitement;
      let p=document.getElementById("penalty");
      p.style.display="block";
      setTimeout(()=>p.style.display="none",1500);
      if(excitement<=0 || time<=0) endGame();
    }
  }
});

function next(){
  current++;
  if(current>=situations.length){
    gameEnded=true;
    clearInterval(timer);
    document.getElementById("win").style.display="block";
  }else loadSituation();
}

function endGame(){
  gameEnded=true;
  clearInterval(timer);
  document.getElementById("gameOver").style.display="block";
}
</script>

</body>
</html>
