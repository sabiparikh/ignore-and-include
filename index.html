<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignore and Include</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center}
h1{margin-top:15px}
#box{border:2px solid #fff;width:90%;max-width:500px;margin:10px auto;padding:10px;font-size:20px}
#game{width:95%;max-width:900px;margin:auto}
.option{border:2px solid #fff;padding:8px;margin:6px;cursor:grab}
.bucket{border:3px dashed #fff;width:45%;min-height:130px;display:inline-block;vertical-align:top;margin:5px;padding:5px}
.correct{background:#0044ff}
button{background:#fff;color:#000;padding:10px 20px;font-size:18px;border:none;cursor:pointer;margin-top:20px}
#penalty{color:red;font-size:22px;display:none}
@media(max-width:700px){.bucket{width:90%}}
</style>
</head>

<body>

<h1>Ignore and Include</h1>

<div id="box">
Time: <span id="time">180</span> sec |
Excitement: <span id="excite">100</span>
</div>

<div id="game"></div>
<div id="penalty">⚠ Wrong bucket! -120 sec & -40 excitement</div>

<script>
let time=180;
let excitement=100;
let current=0;

const timeEl=document.getElementById("time");
const exciteEl=document.getElementById("excite");

// GLOBAL TIMER (FIXED)
setInterval(()=>{
  time--;
  timeEl.innerText=time;
  if(time<=0||excitement<=0) gameOver();
},1000);

const situations=[
{
q:"You came back from school. What should you tell your parents?",
opts:[
"Got a scolding from the teacher",
"You were writing about the chapter",
"A friend talked about her liking pink color",
"A pigeon flew by the class",
"You had dance class",
"You wrote a letter to a teacher and how she responded",
"You had been selected in music",
"Your friend was very upset"
],
include:[
"Got a scolding from the teacher",
"You wrote a letter to a teacher and how she responded",
"You had been selected in music",
"Your friend was very upset"
],
ignore:[
"You were writing about the chapter",
"A friend talked about her liking pink color",
"A pigeon flew by the class",
"You had dance class"
]
},
{
q:"Explain photosynthesis to class 1",
opts:[
"Photosynthesis is the process of making food for plants",
"The stomata take the CO2 in and give it to the chlorophyll to process",
"This process happens inside a plant",
"Light energy is converted into chemical energy, and water molecules",
"Epicuticular wax covers the leaves"
],
include:[
"Photosynthesis is the process of making food for plants",
"This process happens inside a plant",
"Light energy is converted into chemical energy, and water molecules"
],
ignore:[
"The stomata take the CO2 in and give it to the chlorophyll to process",
"Epicuticular wax covers the leaves"
]
},
{
q:"Convince friends your game is best",
opts:[
"The game is quick and it will be fun",
"I want you to listen to me",
"Why are you not listening to me",
"In this game you can learn how to cartwheel"
],
include:[
"The game is quick and it will be fun",
"In this game you can learn how to cartwheel"
],
ignore:[
"I want you to listen to me",
"Why are you not listening to me"
]
}
];

function loadSituation(){
  let s=situations[current];
  let html=`<h2>${s.q}</h2>`;
  s.opts.sort(()=>Math.random()-0.5).forEach(o=>{
    html+=`<div class="option" draggable="true">${o}</div>`;
  });
  html+=`<div class="bucket" id="ignore">Things to Ignore</div>
         <div class="bucket" id="include">Things to Include</div>`;
  game.innerHTML=html;

  document.querySelectorAll(".option").forEach(el=>{
    el.ondragstart=e=>e.dataTransfer.setData("text",el.innerText);
  });

  document.querySelectorAll(".bucket").forEach(b=>{
    b.ondragover=e=>e.preventDefault();
    b.ondrop=e=>{
      e.preventDefault();
      let text=e.dataTransfer.getData("text");
      let s=situations[current];

      let correct=(b.id=="include"&&s.include.includes(text))||(b.id=="ignore"&&s.ignore.includes(text));

      if(correct){
        let el=[...document.querySelectorAll(".option")].find(x=>x.innerText==text);
        el.classList.add("correct");
        b.appendChild(el);
        checkDone();
      }else{
        time-=120;
        excitement-=40;
        exciteEl.innerText=excitement;
        penalty.style.display="block";
        setTimeout(()=>penalty.style.display="none",1500);
        if(time<=0||excitement<=0) gameOver();
      }
    }
  });
}

function checkDone(){
  if(document.querySelectorAll(".option:not(.correct)").length==0){
    current++;
    if(current>=situations.length) winGame();
    else loadSituation();
  }
}

function gameOver(){
  document.body.innerHTML="<h1>Game Over</h1><button onclick='location.reload()'>Play Again</button>";
}

function winGame(){
  document.body.innerHTML="<h1>You Won!</h1><button onclick='location.reload()'>Play Again</button>";
}

loadSituation();
</script>
</body>
</html>
